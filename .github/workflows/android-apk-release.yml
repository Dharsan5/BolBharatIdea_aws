name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
        type: choice
        options:
          - preview
          - production
  push:
    tags:
      - "v*"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BolBharatApp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: BolBharatApp/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK on EAS
        id: eas_build
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          eas build --platform android --profile "$PROFILE" --non-interactive --wait --json > eas-build.json
          cat eas-build.json

      - name: Extract artifact URL
        id: artifact
        run: |
          BUILD_URL=$(node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('eas-build.json','utf8'));const arr=Array.isArray(data)?data:[data];const url=(arr[0] && arr[0].artifacts && (arr[0].artifacts.buildUrl || arr[0].artifacts.applicationArchiveUrl)) || '';if(!url){process.exit(1)};console.log(url)")
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Download APK
        run: curl -L "${{ steps.artifact.outputs.build_url }}" -o BolBharatApp.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bolbharat-android-apk
          path: BolBharatApp/BolBharatApp.apk
          if-no-files-found: error

      - name: Attach APK to GitHub release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: BolBharatApp/BolBharatApp.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
